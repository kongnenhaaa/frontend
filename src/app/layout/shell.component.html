<div class="app-gradient min-h-screen">
  <mat-sidenav-container class="shell-container">
    <mat-sidenav mode="side" opened class="shell-sidenav">
      <div class="px-6 py-6">
        <p class="font-display text-xl text-ink">CoreHR</p>
        <p class="text-sm text-slate-500">Enterprise HR Suite</p>
      </div>
      <mat-nav-list>
        <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
          <mat-icon>dashboard</mat-icon>
          <span>Dashboard</span>
        </a>
        <a mat-list-item routerLink="/employees" routerLinkActive="active-link">
          <mat-icon>groups</mat-icon>
          <span>Employees</span>
        </a>
        <a mat-list-item routerLink="/departments" routerLinkActive="active-link">
          <mat-icon>apartment</mat-icon>
          <span>Departments</span>
        </a>
        <a mat-list-item routerLink="/attendance" routerLinkActive="active-link">
          <mat-icon>event_available</mat-icon>
          <span>Attendance</span>
        </a>
        <a mat-list-item routerLink="/roles" routerLinkActive="active-link">
          <mat-icon>shield</mat-icon>
          <span>Roles</span>
        </a>
        <a mat-list-item routerLink="/reports" routerLinkActive="active-link">
          <mat-icon>insights</mat-icon>
          <span>Reports</span>
        </a>
        <a mat-list-item routerLink="/settings" routerLinkActive="active-link">
          <mat-icon>settings</mat-icon>
          <span>Settings</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content>
      <mat-toolbar color="primary" class="shell-toolbar">
        <span class="font-display text-lg">Team Overview</span>
        <span class="spacer"></span>
        <span class="text-sm mr-4">{{ user()?.email }}</span>
        <button mat-button (click)="logout()">Sign out</button>
      </mat-toolbar>

      <main class="px-8 py-6">
        <router-outlet></router-outlet>
      </main>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
