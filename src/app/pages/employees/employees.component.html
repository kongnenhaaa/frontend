<section class="space-y-4">
  <div class="flex items-center justify-between">
    <div>
      <p class="font-display text-2xl text-ink">Employees</p>
      <p class="text-slate-500">Manage profiles, status, and assignments.</p>
    </div>
    <button mat-raised-button color="primary">Add employee</button>
  </div>
  <mat-card class="p-6">
    <p class="text-sm text-slate-500 mb-4">Total: {{ total() }}</p>
    <div class="space-y-3">
      <div
        class="flex items-center justify-between rounded-xl border border-slate-200 bg-white px-4 py-3"
        *ngFor="let employee of employees()"
      >
        <div>
          <p class="font-medium text-ink">{{ employee.firstName }} {{ employee.lastName }}</p>
          <p class="text-xs text-slate-500">{{ employee.email }}</p>
        </div>
        <span class="text-xs uppercase text-slate-400">{{ employee.status }}</span>
      </div>
      <p class="text-sm text-slate-500" *ngIf="employees().length === 0">No employees yet.</p>
    </div>
  </mat-card>
</section>
