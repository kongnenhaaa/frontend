<div class="dlg-root">
  <!-- Header -->
  <div class="dlg-header">
    <div class="dlg-icon" [style.background]="isEdit ? 'rgba(249,115,22,0.12)' : 'rgba(99,102,241,0.12)'"
         [style.color]="isEdit ? '#ea580c' : '#6366f1'">
      <svg viewBox="0 0 24 24" fill="none">
        <path *ngIf="!isEdit" d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.8"/>
        <circle *ngIf="!isEdit" cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/>
        <path *ngIf="!isEdit" d="M19 8v6M22 11h-6" stroke="currentColor" stroke-width="1.8"/>
        <path *ngIf="isEdit" d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path *ngIf="isEdit" d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5Z" stroke="currentColor" stroke-width="1.8"/>
      </svg>
    </div>
    <div>
      <h2>{{ isEdit ? 'Edit Employee' : 'Add Employee' }}</h2>
      <p>{{ isEdit ? 'Update employee profile information' : 'Register a new team member' }}</p>
    </div>
    <button class="dlg-close" (click)="close()">
      <svg viewBox="0 0 24 24" fill="none"><path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
  </div>

  <!-- Form -->
  <form [formGroup]="form" (ngSubmit)="save()" class="dlg-form">

    <!-- Code -->
    <div class="field-group">
      <label>Employee Code <span class="req">*</span></label>
      <div class="input-wrap" [class.err]="form.get('code')?.invalid && form.get('code')?.touched">
        <svg viewBox="0 0 24 24" fill="none"><path d="M9 12h6M9 16h6M13 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9l-6-6Z" stroke="currentColor" stroke-width="1.5"/></svg>
        <input formControlName="code" placeholder="e.g. EMP-001" />
      </div>
    </div>

    <!-- Name row -->
    <div class="field-row">
      <div class="field-group">
        <label>First Name <span class="req">*</span></label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.5"/></svg>
          <input formControlName="firstName" placeholder="First name" />
        </div>
      </div>
      <div class="field-group">
        <label>Last Name <span class="req">*</span></label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.5"/></svg>
          <input formControlName="lastName" placeholder="Last name" />
        </div>
      </div>
    </div>

    <!-- Email -->
    <div class="field-group">
      <label>Email Address <span class="req">*</span></label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="m22 7-10 7L2 7" stroke="currentColor" stroke-width="1.5"/></svg>
        <input formControlName="email" type="email" placeholder="employee@company.com" />
      </div>
    </div>

    <!-- Phone + Title row -->
    <div class="field-row">
      <div class="field-group">
        <label>Phone</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1A19.5 19.5 0 0 1 5.7 13a19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.7 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.6a2 2 0 0 1-.5 2.1L9 9.3a16 16 0 0 0 5.7 5.7l.9-.9a2 2 0 0 1 2.1-.4c.8.3 1.7.6 2.6.7a2 2 0 0 1 1.7 2Z" stroke="currentColor" stroke-width="1.5"/></svg>
          <input formControlName="phone" placeholder="+84 xxx xxx xxx" />
        </div>
      </div>
      <div class="field-group">
        <label>Job Title</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="7" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M16 7V5a2 2 0 0 0-4 0v2" stroke="currentColor" stroke-width="1.5"/></svg>
          <input formControlName="title" placeholder="e.g. Software Engineer" />
        </div>
      </div>
    </div>

    <!-- Status -->
    <div class="field-group">
      <label>Status <span class="req">*</span></label>
      <div class="status-selector">
        <label class="status-opt" [class.sel]="form.get('status')?.value === 'active'">
          <input type="radio" formControlName="status" value="active" hidden />
          <i class="dot green"></i> Active
        </label>
        <label class="status-opt" [class.sel]="form.get('status')?.value === 'inactive'">
          <input type="radio" formControlName="status" value="inactive" hidden />
          <i class="dot gray"></i> Inactive
        </label>
        <label class="status-opt" [class.sel]="form.get('status')?.value === 'on_leave'">
          <input type="radio" formControlName="status" value="on_leave" hidden />
          <i class="dot orange"></i> On Leave
        </label>
      </div>
    </div>

    <!-- Actions -->
    <div class="dlg-actions">
      <button type="button" class="cancel-btn" (click)="close()">Cancel</button>
      <button type="submit" class="save-btn" [disabled]="form.invalid">
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        {{ isEdit ? 'Update' : 'Add Employee' }}
      </button>
    </div>
  </form>
</div>
