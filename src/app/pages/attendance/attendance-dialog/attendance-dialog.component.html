<div class="dlg-root">
  <div class="dlg-header">
    <div class="dlg-icon" [style.background]="isEdit ? 'rgba(249,115,22,0.12)' : 'rgba(34,197,94,0.12)'"
         [style.color]="isEdit ? '#ea580c' : '#16a34a'">
      <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M16 2v4M8 2v4M3 10h18M9 16l2 2 4-4" stroke="currentColor" stroke-width="1.8"/></svg>
    </div>
    <div>
      <h2>{{ isEdit ? 'Edit Attendance' : 'Add Attendance Record' }}</h2>
      <p>{{ isEdit ? 'Update the attendance record' : 'Log a new check-in/check-out entry' }}</p>
    </div>
    <button class="dlg-close" (click)="close()">
      <svg viewBox="0 0 24 24" fill="none"><path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="save()" class="dlg-form">

    <!-- Employee -->
    <div class="field-group">
      <label>Employee <span class="req">*</span></label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.5"/></svg>
        <select formControlName="employeeId">
          <option value="" disabled>Select employee...</option>
          @for (emp of employees(); track emp.id) {
            <option [value]="emp.id">{{ emp.firstName }} {{ emp.lastName }} ({{ emp.code }})</option>
          }
        </select>
      </div>
    </div>

    <!-- Date -->
    <div class="field-group">
      <label>Date <span class="req">*</span></label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="1.5"/></svg>
        <input formControlName="date" type="date" />
      </div>
    </div>

    <!-- Check In / Out -->
    <div class="field-row">
      <div class="field-group">
        <label>Check In</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/><path d="M12 7v5l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <input formControlName="checkIn" type="datetime-local" />
        </div>
      </div>
      <div class="field-group">
        <label>Check Out</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/><path d="M12 7v5l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <input formControlName="checkOut" type="datetime-local" />
        </div>
      </div>
    </div>

    <!-- Status -->
    <div class="field-group">
      <label>Status <span class="req">*</span></label>
      <div class="status-selector">
        <label class="status-opt" [class.sel]="form.get('status')?.value === 'present'">
          <input type="radio" formControlName="status" value="present" hidden />
          <i class="dot green"></i> Present
        </label>
        <label class="status-opt" [class.sel]="form.get('status')?.value === 'absent'">
          <input type="radio" formControlName="status" value="absent" hidden />
          <i class="dot red"></i> Absent
        </label>
        <label class="status-opt" [class.sel]="form.get('status')?.value === 'late'">
          <input type="radio" formControlName="status" value="late" hidden />
          <i class="dot orange"></i> Late
        </label>
        <label class="status-opt" [class.sel]="form.get('status')?.value === 'half_day'">
          <input type="radio" formControlName="status" value="half_day" hidden />
          <i class="dot blue"></i> Half Day
        </label>
      </div>
    </div>

    <div class="dlg-actions">
      <button type="button" class="cancel-btn" (click)="close()">Cancel</button>
      <button type="submit" class="save-btn" [disabled]="form.invalid">
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        {{ isEdit ? 'Update' : 'Save Record' }}
      </button>
    </div>
  </form>
</div>
