<section class="space-y-4">
  <div class="flex items-center justify-between">
    <div>
      <p class="font-display text-2xl text-ink">Attendance</p>
      <p class="text-slate-500">Track presence and time logs.</p>
    </div>
    <button mat-raised-button color="primary">Add record</button>
  </div>
  <mat-card class="p-6">
    <div class="space-y-3">
      <div
        class="flex items-center justify-between rounded-xl border border-slate-200 bg-white px-4 py-3"
        *ngFor="let record of records()"
      >
        <p class="font-medium text-ink">{{ record.date }}</p>
        <span class="text-xs uppercase text-slate-400">{{ record.status }}</span>
      </div>
      <p class="text-sm text-slate-500" *ngIf="records().length === 0">No attendance yet.</p>
    </div>
  </mat-card>
</section>
