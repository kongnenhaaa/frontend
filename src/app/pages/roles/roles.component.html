<section class="space-y-4">
  <div class="flex items-center justify-between">
    <div>
      <p class="font-display text-2xl text-ink">Roles & Permissions</p>
      <p class="text-slate-500">Define access rules without hardcoding.</p>
    </div>
    <button mat-raised-button color="primary">Create role</button>
  </div>
  <mat-card class="p-6">
    <div class="space-y-3">
      <div
        class="rounded-xl border border-slate-200 bg-white px-4 py-3"
        *ngFor="let role of roles()"
      >
        <p class="font-medium text-ink">{{ role.name }}</p>
        <p class="text-xs text-slate-500">{{ role.description || 'No description' }}</p>
      </div>
      <p class="text-sm text-slate-500" *ngIf="roles().length === 0">No roles yet.</p>
    </div>
  </mat-card>
</section>
