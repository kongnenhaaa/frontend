<div class="dlg-root">
  <div class="dlg-header">
    <div class="dlg-icon" style="background:rgba(99,102,241,0.12);color:#6366f1">
      <svg viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z" stroke="currentColor" stroke-width="1.8"/><path d="M9 22V12h6v10" stroke="currentColor" stroke-width="1.8"/></svg>
    </div>
    <div>
      <h2>{{ isEdit ? 'Edit Department' : 'New Department' }}</h2>
      <p>{{ isEdit ? 'Update department details' : 'Create a new organizational unit' }}</p>
    </div>
    <button class="dlg-close" (click)="close()">
      <svg viewBox="0 0 24 24" fill="none"><path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="save()" class="dlg-form">

    <div class="field-group">
      <label>Department Name <span class="req">*</span></label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z" stroke="currentColor" stroke-width="1.5"/></svg>
        <input formControlName="name" placeholder="e.g. Engineering" />
      </div>
    </div>

    <div class="field-group">
      <label>Description</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6Z" stroke="currentColor" stroke-width="1.5"/><path d="M8 13h8M8 17h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <textarea formControlName="description" rows="3" placeholder="Brief description of this department..."></textarea>
      </div>
    </div>

    <div class="field-group">
      <label>Status</label>
      <div class="status-selector">
        <label class="status-opt" [class.sel]="form.get('isActive')?.value === true">
          <input type="radio" [value]="true" formControlName="isActive" hidden />
          <i class="dot green"></i> Active
        </label>
        <label class="status-opt" [class.sel]="form.get('isActive')?.value === false">
          <input type="radio" [value]="false" formControlName="isActive" hidden />
          <i class="dot gray"></i> Inactive
        </label>
      </div>
    </div>

    <div class="dlg-actions">
      <button type="button" class="cancel-btn" (click)="close()">Cancel</button>
      <button type="submit" class="save-btn" [disabled]="form.invalid">
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        {{ isEdit ? 'Update' : 'Create Department' }}
      </button>
    </div>
  </form>
</div>
