<section class="space-y-4">
  <div class="flex items-center justify-between">
    <div>
      <p class="font-display text-2xl text-ink">Departments</p>
      <p class="text-slate-500">Structure teams and reporting lines.</p>
    </div>
    <button mat-raised-button color="primary">New department</button>
  </div>
  <mat-card class="p-6">
    <div class="space-y-3">
      <div
        class="flex items-center justify-between rounded-xl border border-slate-200 bg-white px-4 py-3"
        *ngFor="let department of departments()"
      >
        <div>
          <p class="font-medium text-ink">{{ department.name }}</p>
          <p class="text-xs text-slate-500">{{ department.description || '—' }}</p>
        </div>
        <span class="text-xs uppercase text-slate-400">{{ department.isActive ? 'active' : 'inactive' }}</span>
      </div>
      <p class="text-sm text-slate-500" *ngIf="departments().length === 0">No departments yet.</p>
    </div>
  </mat-card>
</section>
