<div class="confirm-wrap">
  <div class="confirm-top">
    <div class="confirm-icon" [class.tone-danger]="data.tone === 'danger'" [class.tone-warn]="data.tone === 'warn'">
      <mat-icon>{{ iconName }}</mat-icon>
    </div>
    <div class="confirm-text">
      <h2>{{ data.title }}</h2>
      <p>{{ data.message }}</p>
    </div>
  </div>

  <div class="confirm-actions">
    <button mat-stroked-button class="btn-cancel" (click)="cancel()">{{ cancelText }}</button>
    <button mat-flat-button class="btn-confirm" [class.tone-danger]="data.tone === 'danger'" [class.tone-warn]="data.tone === 'warn'" (click)="confirm()">
      {{ confirmText }}
    </button>
  </div>
</div>
